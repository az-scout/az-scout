repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies:
          - fastapi>=0.115
          - click>=8.1
          - types-requests>=2.31
          - pydantic>=2.0
        args: [--ignore-missing-imports]
        pass_filenames: false
        entry: mypy src/

  - repo: local
    hooks:
      - id: bicep-to-arm
        name: Rebuild deploy/main.json from Bicep
        language: system
        entry: bash -c 'az bicep build -f deploy/main.bicep --outfile deploy/main.json && echo >> deploy/main.json && git add deploy/main.json'
        files: ^deploy/main\.bicep$
        pass_filenames: false

  - repo: local
    hooks:
      - id: biome-lint
        name: Lint JavaScript (Biome)
        language: system
        entry: npx -y @biomejs/biome@2.4.6 lint
        types: [javascript]
        files: ^src/az_scout/.*\\.js$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-toml
